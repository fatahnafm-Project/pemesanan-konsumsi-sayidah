<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Order Konsumsi v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .upload-box { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .upload-box:hover { border-color: #64748b; background-color: #f8fafc; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-slate-900 p-6 shadow-xl mb-8">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-white font-bold text-xl tracking-tighter">KONSUMTOR <span class="text-amber-500">PRO</span></h1>
            <button onclick="generatePDF()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-8 py-2 rounded-full font-black text-sm transition transform hover:scale-105 shadow-lg">
                CETAK PESANAN (F4)
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">1. Unggah Kop Surat (JPG/PNG)</label>
                <input type="file" id="uploadKop" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
                <p class="text-[10px] text-slate-400 mt-2">*Disarankan bentuk memanjang (Landscape)</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">2. Unggah Tanda Tangan (PNG Transparan)</label>
                <input type="file" id="uploadTtd" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
            </div>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="namaSayidah" placeholder="Nama Sayidah / Penerima" class="p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 ring-amber-500">
            <input type="text" id="namaKegiatan" placeholder="Nama Kegiatan" class="p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 ring-amber-500">
            <input type="text" id="tglKegiatan" placeholder="Tanggal Pelaksanaan" class="p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 ring-amber-500">
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center"><span class="bg-slate-100 p-2 rounded-lg mr-2">📦</span> Satuan</h3>
                <div class="space-y-3">
                    <input type="text" id="itemNama" placeholder="Contoh: Nasi Kotak Ayam" class="w-full p-3 border rounded-xl text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="itemQty" placeholder="Jumlah" class="p-3 border rounded-xl text-sm">
                        <input type="text" id="itemKet" placeholder="Keterangan" class="p-3 border rounded-xl text-sm">
                    </div>
                    <button onclick="tambahItem('SATUAN')" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-xs uppercase tracking-widest">Tambah Satuan</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center"><span class="bg-amber-100 p-2 rounded-lg mr-2">🍽️</span> Prasmanan</h3>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="prasQty" placeholder="Jumlah Orang" class="p-3 border rounded-xl text-sm">
                        <input type="number" id="prasBudget" placeholder="Budget/Orang" class="p-3 border rounded-xl text-sm">
                    </div>
                    <input type="text" id="prasKet" placeholder="Keterangan Menu" class="w-full p-3 border rounded-xl text-sm">
                    <button onclick="tambahItem('PRASMANAN')" class="w-full py-3 bg-amber-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest">Tambah Prasmanan</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] text-slate-400 uppercase font-black">
                        <th class="p-4">Jenis</th>
                        <th class="p-4">Rincian Pesanan</th>
                        <th class="p-4">Keterangan</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="tabelDaftar" class="text-sm"></tbody>
            </table>
        </div>
    </main>

    <script>
        let daftarPesanan = [];
        let imgKop = null;
        let imgTtd = null;

        // Listener untuk konversi gambar ke Base64 agar bisa masuk ke PDF
        document.getElementById('uploadKop').addEventListener('change', function(e) {
            readImage(e.target.files[0], (base64) => imgKop = base64);
        });
        document.getElementById('uploadTtd').addEventListener('change', function(e) {
            readImage(e.target.files[0], (base64) => imgTtd = base64);
        });

        function readImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => callback(e.target.result);
            reader.readAsDataURL(file);
        }

        function tambahItem(type) {
            if(type === 'SATUAN') {
                const nama = document.getElementById('itemNama').value;
                const qty = document.getElementById('itemQty').value;
                const ket = document.getElementById('itemKet').value;
                if(!nama || !qty) return alert("Isi data!");
                daftarPesanan.push({ type, nama, rincian: qty + " Porsi", ket });
                document.getElementById('itemNama').value = ""; document.getElementById('itemQty').value = ""; document.getElementById('itemKet').value = "";
            } else {
                const qty = document.getElementById('prasQty').value;
                const budget = document.getElementById('prasBudget').value;
                const ket = document.getElementById('prasKet').value;
                if(!qty || !budget) return alert("Isi data!");
                daftarPesanan.push({ type, nama: "Prasmanan", rincian: `${qty} Orang (Rp ${parseInt(budget).toLocaleString()}/org)`, ket });
                document.getElementById('prasQty').value = ""; document.getElementById('prasBudget').value = ""; document.getElementById('prasKet').value = "";
            }
            renderTable();
        }

        function renderTable() {
            const b = document.getElementById('tabelDaftar');
            b.innerHTML = daftarPesanan.map((p, i) => `
                <tr class="border-b">
                    <td class="p-4 font-bold text-[10px]">${p.type}</td>
                    <td class="p-4 text-slate-700">${p.nama} - <span class="font-bold">${p.rincian}</span></td>
                    <td class="p-4 text-slate-500 italic">${p.ket}</td>
                    <td class="p-4 text-right"><button onclick="daftarPesanan.splice(${i},1);renderTable()" class="text-red-400 font-bold">✕</button></td>
                </tr>
            `).join('');
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', [210, 330]); // Ukuran F4

            const sayidah = document.getElementById('namaSayidah').value || "..................";
            const kegiatan = document.getElementById('namaKegiatan').value || "Ujian";
            const tgl = document.getElementById('tglKegiatan').value || "-";

            // 1. KOP SURAT (GAMBAR)
            if(imgKop) {
                doc.addImage(imgKop, 'PNG', 10, 10, 190, 40); // Posisi & Ukuran Kop
            } else {
                doc.setFontSize(20); doc.text("KOP SURAT", 105, 30, {align:'center'});
            }

            // 2. HEADER TEKS
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.text(`Hal: Permohonan Pemesanan Konsumsi`, 15, 60);
            doc.text(`Kepada Yth:`, 15, 70);
            doc.setFont("helvetica", "bold");
            doc.text(sayidah, 15, 75);
            doc.setFont("helvetica", "normal");
            doc.text("di Tempat", 15, 80);

            doc.text("Assalamu'alaikum Wr. Wb.", 15, 90);
            const pembuka = `Sehubungan dengan dilaksanakannya kegiatan ${kegiatan} pada tanggal ${tgl}, kami selaku panitia bermaksud memesan konsumsi dengan rincian sebagai berikut:`;
            doc.text(doc.splitTextToSize(pembuka, 180), 15, 97);

            // 3. TABEL
            doc.autoTable({
                head: [['No', 'Pesanan / Menu', 'Kuantitas', 'Keterangan Tambahan']],
                body: daftarPesanan.map((p, i) => [i+1, p.nama, p.rincian, p.ket]),
                startY: 110,
                theme: 'grid',
                headStyles: { fillColor: [50, 50, 50] },
                styles: { fontSize: 10, cellPadding: 4 }
            });

            // 4. PENUTUP
            let finalY = doc.lastAutoTable.finalY + 10;
            doc.text("Demikian permohonan ini kami sampaikan, atas kerja samanya kami ucapkan terima kasih.", 15, finalY);
            doc.text("Wassalamu'alaikum Wr. Wb.", 15, finalY + 7);

            // 5. TANDA TANGAN (GAMBAR)
            const signY = finalY + 20;
            doc.text("Hormat kami,", 145, signY);
            doc.text("Konsumtor Panitia,", 145, signY + 5);
            
            if(imgTtd) {
                doc.addImage(imgTtd, 'PNG', 140, signY + 7, 40, 20); // Posisi & Ukuran TTD
            }
            
            doc.setFont("helvetica", "bold");
            doc.text("( ................................... )", 145, signY + 35);

            doc.save(`Order_Konsumsi_${kegiatan}.pdf`);
        }
    </script>
</body>
</html>
